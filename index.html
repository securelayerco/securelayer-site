    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:       #0D1B2A;
      --mid:        #1B3A5C;
      --accent:     #2E86AB;
      --accent-dim: rgba(46,134,171,0.15);
      --gray:       #A5B4C4; /* Un tono más claro para mejor legibilidad */
      --light:      #F4F6F8;
      --white:      #ffffff;
      --font-head:  'Barlow Condensed', sans-serif;
      --font-body:  'Barlow', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 400; /* Aumentado de 300 a 400 */
      line-height: 1.8; /* Aumentado para dar aire al texto */
      overflow-x: hidden;
    }

    /* ── DOTS BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(46,134,171,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 48px;
      background: rgba(13,27,42,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(46,134,171,0.2);
    }

    .nav-logo img {
      height: 48px;
      display: block;
      filter: brightness(0) invert(1); 
      transition: opacity 0.2s;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 36px;
      align-items: center;
    }

    nav ul a {
      color: var(--white);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nav-cta {
      background: var(--accent);
      padding: 10px 24px;
      border-radius: 4px;
      font-weight: 600 !important;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 140px 48px 80px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('SecureLayerCo_LinkedIn_Banner.png') center/cover no-repeat;
      opacity: 0.1;
      z-index: -1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(46,134,171,0.5);
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.1;
      max-width: 900px;
    }

    h1 em { font-style: normal; color: var(--accent); }

    .hero-sub {
      margin-top: 32px;
      max-width: 650px;
      font-size: 1.25rem; /* Aumentado para ser la descripción principal */
      color: var(--gray);
      line-height: 1.7;
    }

    .hero-actions {
      margin-top: 48px;
      display: flex;
      gap: 20px;
    }
